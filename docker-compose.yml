version: '3.8'

services:
  db:
    image: postgres:16
    container_name: powerlifting_postgres_db
    restart: always
    environment:
      POSTGRES_USER: POWERLIFTER_KUNAL
      POSTGRES_PASSWORD: Kunal123
      POSTGRES_DB: powerlifting_db
    ports:
      - "2003:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U POWERLIFTER_KUNAL -d powerlifting_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: powerlift_init
    environment:
      - DB_URL=postgresql://POWERLIFTER_KUNAL:Kunal123@db:5432/powerlifting_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/raw:/app/data/raw

  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: powerlift_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Docker internal networking: talks directly to the 'db' service on port 5432
      - DB_URL=postgresql://POWERLIFTER_KUNAL:Kunal123@db:5432/powerlifting_db
      # Make sure your container gets your Groq API key (assuming you use a .env file)
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - init

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: powerlift_ui
    restart: always
    ports:
      - "8501:8501"
    environment:
      # Internal networking: talks directly to the 'api' service
      - API_BASE_URL=http://api:8080/api
      # Internal networking: talks directly to the database
      - DB_URL=postgresql://POWERLIFTER_KUNAL:Kunal123@db:5432/powerlifting_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - init

volumes:
  postgres_data:
    driver: local
